<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0f1a" />
  <meta name="description" content="Relational memory engine and AI control interface" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ClingySOCKs" />
  <title>ClingySOCKs</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            nexus: {
              900: '#0a0a0f',
              800: '#13131f',
              700: '#1c1c2e',
              accent: '#00f2ff',
              cosy: '#ff9e64',
            }
          },
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'glow': 'glow 2s ease-in-out infinite alternate',
          },
          keyframes: {
            glow: {
              '0%': { boxShadow: '0 0 5px #00f2ff33' },
              '100%': { boxShadow: '0 0 20px #00f2ff66' },
            }
          }
        },
      },
    }
  </script>
  <style>
    body {
      background-color: #050508;
      color: #e2e8f0;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #0a0a0f;
    }

    ::-webkit-scrollbar-thumb {
      background: #1c1c2e;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #2d2d45;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script>
    // Pre-load runtime config synchronously so all modules see the correct API URL
    (function() {
      try {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/config.json', false); // synchronous
        xhr.send();
        if (xhr.status === 200) {
          var cfg = JSON.parse(xhr.responseText);
          if (cfg.VITE_MEMORY_API_URL && cfg.VITE_MEMORY_API_URL !== 'RUNTIME_API_URL_PLACEHOLDER') {
            window.__RUNTIME_CONFIG__ = cfg;
          }
        }
      } catch(e) { /* local dev — no config.json */ }
    })();
  </script>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
