server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Inject runtime config (API URL) so Vite build-time baking isn't required
    # The frontend reads /config.json to discover the backend URL at runtime.
    location = /config.json {
        default_type application/json;
        return 200 '{"VITE_MEMORY_API_URL":"RUNTIME_API_URL_PLACEHOLDER"}';
    }

    # SPA client-side routing: serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
