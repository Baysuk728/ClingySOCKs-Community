[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

# To use pre-built GHCR image instead, replace [build] above with:
# [build]
# builder = "image"
# image = "ghcr.io/<your-github-user>/clingysocks-frontend:latest"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
